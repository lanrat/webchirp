# Build the production bundle (npm run build:dist) and deploy dist/ to GitHub
# Pages, which serves the app at https://webchirp.jasiek.me/. Replaces the
# legacy Jekyll deployment that served the raw repo tree.
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight deploy finish so Pages history stays
# consistent, but skip intermediate queued runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # build:catalog reads driver sources from the chirp/ submodule and
          # fails on a submodule/runtime-pin mismatch.
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - run: npm run build:dist
      # Carry the currently-deployed generation of hashed assets into the new
      # artifact so a Pages-cached index.html (max-age=600, not configurable)
      # keeps resolving during the ~10 minutes after a deploy.
      - run: node scripts/retain-deployed-assets.mjs https://webchirp.jasiek.me
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
